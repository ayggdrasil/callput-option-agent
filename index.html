<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Callput Lite MCP Operator Console</title>
    <meta
      name="description"
      content="Callput Lite MCP now uses one operator console page for external agents trading crypto and stock option spreads on Base."
    />
    <link rel="canonical" href="./frontend-v1/" />
    <meta http-equiv="refresh" content="0; url=./frontend-v1/" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #05080b;
        --panel: #0b151b;
        --stroke: rgba(130, 210, 235, 0.2);
        --text: #f0f8fb;
        --muted: #9bafba;
        --cyan: #21c9ff;
        --green: #41e77d;
        --ink: #061017;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          repeating-linear-gradient(90deg, rgba(112, 208, 232, 0.035) 0 1px, transparent 1px 68px),
          repeating-linear-gradient(0deg, rgba(112, 208, 232, 0.035) 0 1px, transparent 1px 68px),
          var(--bg);
        color: var(--text);
      }

      main {
        width: min(560px, calc(100vw - 32px));
        border: 1px solid var(--stroke);
        border-radius: 8px;
        background: rgba(11, 21, 27, 0.86);
        padding: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 6vw, 44px);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      p {
        margin: 16px 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        margin-top: 22px;
        border-radius: 6px;
        padding: 0 14px;
        color: var(--ink);
        background: var(--green);
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Callput Lite MCP Operator Console</h1>
      <p>The root page now points to the single operator console. It includes setup, markets, strategies, tool contracts, and security guidance in one place.</p>
      <a href="./frontend-v1/">Open Operator Console</a>
    </main>
    <script>
      const target = new URL("./frontend-v1/", window.location.href);
      const legacyHashMap = {
        "#top": "#start",
        "#setup": "#start",
        "#workflow": "#flows",
        "#tools": "#contracts"
      };
      target.hash = legacyHashMap[window.location.hash] || window.location.hash;
      window.location.replace(target.href);
    </script>
  </body>
</html>
